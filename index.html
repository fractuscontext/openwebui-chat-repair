<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWebUI Chat Fix</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
</head>

<body>

    <main class="container">
        <div class="header">
            <span class="icon">🙀</span>
            <div>
                <h1>OpenWebUI Chat Fix</h1>
                <p class="tagline">Rescue corrupted OpenWebUI chats</p>
            </div>
        </div>

        <p class="description">Fix &ldquo;Loading&hellip;&rdquo; errors, detached nodes, and sync issues.</p>

        <div class="drop-zone" id="dropZone">
            <p>Click or drag JSON file here</p>
            <input type="file" id="fileInput" accept=".json" hidden>
        </div>

        <div class="options">
            <label>
                <input type="checkbox" id="pruneMode">
                <strong>Deep Clean Mode</strong>
            </label>
            <small>Repairs broken pointers <em>and</em> removes all unused conversation branches.</small>
        </div>

        <button id="actionBtn" disabled>Upload JSON to Begin</button>

        <div id="status"></div>
        <div id="stats" class="stats" hidden></div>

        <footer class="footer">
            <span>© 2025-2026 @fractuscontext</span>
            <span>·</span>
            <span>GPL-3.0-or-later</span>
            <span>·</span>
            <a href="https://github.com/fractuscontext/open-webui-chat-fix" target="_blank"
                rel="noopener noreferrer">GitHub</a>
        </footer>
    </main>

    <script src="./app.js"></script>
</body>

</html>
